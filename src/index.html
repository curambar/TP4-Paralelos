<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Concurrencia: App de Pedidos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>🍔 App Delivery: Sincronización Concurrente</h1>

<div class="controls">
    <div class="control-group">
        <label for="prodSlider">Clientes (Pedidos): <span id="valProd">2</span></label>
        <input type="range" id="prodSlider" min="1" max="15" value="2" oninput="document.getElementById('valProd').innerText=this.value">
    </div>
    <div class="control-group">
        <label for="consSlider">Cocineros: <span id="valCons">2</span></label>
        <input type="range" id="consSlider" min="1" max="15" value="2" oninput="document.getElementById('valCons').innerText=this.value">
    </div>
    <div class="control-group">
        <label for="sizeSlider">Capacidad Bandeja: <span id="valSize">5</span></label>
        <input type="range" id="sizeSlider" min="3" max="20" value="5" oninput="document.getElementById('valSize').innerText=this.value">
    </div>
    <button onclick="reiniciar()">Aplicar Cambios</button>
</div>

<div class="layout-principal">

    <div class="columna-actores" id="panel-productores">
        <h3>📱 Clientes</h3>
    </div>

    <div class="columna-centro">
        <div class="buffer-container" id="bufferUI"></div>

        <div class="semaforos">
            <div class="sem-box" id="cajaVacios">
                <div class="sem-label">Espacio en Bandeja</div>
                <div class="sem-value" id="semVacios">-</div>
            </div>
            <div class="sem-box" id="cajaLlenos">
                <div class="sem-label">Tickets Pendientes</div>
                <div class="sem-value" id="semLlenos">-</div>
            </div>
        </div>
    </div>

    <div class="columna-actores" id="panel-consumidores">
        <h3>👨‍🍳 Cocineros</h3>
    </div>

</div>

<script src="api.js"></script>
</body>
</html>
